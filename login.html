<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="data:,">
  <title>Вход | Анализ ТКП</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./dashboard/vendor/weatherspark.css">
  <link rel="stylesheet" href="./dashboard/styles.css">
  <style>
    .login-panel {
      border-color: #c9c6c4;
      padding: clamp(24px, 5vw, 36px);
      background: #fff;
      box-shadow: var(--shadow-lg);
    }

    .login-form label {
      display: grid;
      gap: 6px;
      color: var(--ink);
      font-weight: 700;
    }

    .login-form input {
      min-height: 48px;
      padding: 11px 12px;
      color: var(--ink);
      background: #fff;
    }

    .login-form .primary-button {
      width: 100%;
      min-height: 48px;
      margin-top: 4px;
    }

    .login-error {
      margin: 0;
      padding: 10px 12px;
      border: 1px solid var(--danger-line);
      color: var(--danger);
      background: var(--danger-bg);
    }

    .login-error[hidden] {
      display: none;
    }
  </style>
</head>
<body class="login-page">
  <main class="login-shell">
    <section class="login-panel">
      <div>
        <p class="eyebrow">Анализ ТКП</p>
        <h1>Вход</h1>
        <p class="muted">Введите логин и пароль, чтобы открыть рабочую область.</p>
      </div>

      <form id="login-form" class="login-form">
        <label>
          <span>Логин</span>
          <input id="login-name" name="login" type="text" autocomplete="username" inputmode="text" autofocus required>
        </label>
        <label>
          <span>Пароль</span>
          <input id="login-password" name="password" type="password" autocomplete="current-password" required>
        </label>
        <button class="primary-button" type="submit">Войти</button>
        <p id="login-error" class="login-error" role="alert" aria-live="polite" hidden></p>
      </form>
    </section>
  </main>

  <script>
    const authKey = "analysis_tkp_auth_v1";
    const usersKey = "analysis_tkp_users_v1";
    const form = document.getElementById("login-form");
    const loginName = document.getElementById("login-name");
    const loginPassword = document.getElementById("login-password");
    const loginError = document.getElementById("login-error");

    function migrateLegacyStorageKey(targetKey, legacySuffix) {
      if (localStorage.getItem(targetKey) !== null) return;
      const legacyPrefix = String.fromCharCode(111, 109, 97, 114, 116, 97);
      const legacyValue = localStorage.getItem(`${legacyPrefix}_${legacySuffix}`);
      if (legacyValue !== null) localStorage.setItem(targetKey, legacyValue);
    }

    migrateLegacyStorageKey(authKey, "auth_v1");
    migrateLegacyStorageKey(usersKey, "users_v1");

    function saveAuth(user, token = "") {
      localStorage.setItem(authKey, JSON.stringify({
        token,
        username: user.login,
        fullName: user.fullName || user.full_name || user.login,
        role: user.role || "user",
        signedInAt: new Date().toISOString(),
      }));
    }

    function ensureLocalAdmin(users) {
      const existingAdmin = users.find((item) => String(item.login).toLowerCase() === "123");
      if (existingAdmin) {
        Object.assign(existingAdmin, {
          fullName: "Тестовый админ",
          login: "123",
          password: "123",
          role: "admin",
          active: true,
        });
        localStorage.setItem(usersKey, JSON.stringify(users));
      } else {
        users.unshift({
          id: crypto.randomUUID ? crypto.randomUUID() : `user-${Date.now()}`,
          fullName: "Тестовый админ",
          login: "123",
          password: "123",
          role: "admin",
          active: true,
          createdAt: new Date().toISOString(),
        });
        localStorage.setItem(usersKey, JSON.stringify(users));
      }
    }

    function localLogin(username, password) {
      let users = [];
      try {
        users = JSON.parse(localStorage.getItem(usersKey) || "[]");
      } catch {
        users = [];
      }
      ensureLocalAdmin(users);
      const user = users.find((item) =>
        String(item.login || "").toLowerCase() === username.toLowerCase()
        && item.password === password
      );
      if (!user || user.active === false) return false;
      saveAuth(user);
      return true;
    }

    function showError(message) {
      loginError.textContent = message;
      loginError.hidden = false;
      loginPassword.focus();
      loginPassword.select();
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      loginError.hidden = true;
      const username = loginName.value.trim();
      const password = loginPassword.value;
      if (!username || !password) return;

      // GitHub Pages and other static hosting do not run server.py.
      // Try the browser-stored test account before requesting the optional API.
      if (localLogin(username, password)) {
        window.location.href = "./dashboard/projects.html";
        return;
      }

      try {
        const response = await fetch("./api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ login: username, password }),
        });
        if (response.ok) {
          const payload = await response.json();
          saveAuth(payload.user, payload.token);
          window.location.href = "./dashboard/projects.html";
          return;
        }
        const localPreviewStatuses = [404, 405, 501, 503];
        if (!localPreviewStatuses.includes(response.status)) {
          showError("Неверный логин или пароль.");
          return;
        }
      } catch {}

      showError("Неверный логин или пароль.");
    });
  </script>
</body>
</html>
